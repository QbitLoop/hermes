<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Agent — System Architecture</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }
    .container { max-width: 1100px; width: 100%; margin: 0 auto; }

    /* header */
    .badge {
      display: inline-block;
      background: #1f6feb;
      color: #fff;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: clamp(1.3rem, 3.5vw, 1.9rem);
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: #8b949e;
      font-size: 0.82rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .sub a { color: #58a6ff; text-decoration: none; }

    /* node system */
    .node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .node-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .node-icon .material-icons { font-size: 1.2rem; }
    .node-icon.blue   { background: #0d2340; border: 1.5px solid #58a6ff; color: #58a6ff; }
    .node-icon.green  { background: #0d2a1a; border: 1.5px solid #56d364; color: #56d364; }
    .node-icon.amber  { background: #2a1f05; border: 1.5px solid #e3b341; color: #e3b341; }
    .node-icon.purple { background: #1e0d33; border: 1.5px solid #bc8cff; color: #bc8cff; }
    .node-icon.coral  { background: #2a0d0d; border: 1.5px solid #ff7b72; color: #ff7b72; }
    .node-icon.gray   { background: #161b22; border: 1.5px solid #8b949e; color: #8b949e; }
    .node-icon.hex {
      border-radius: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      border: none;
      background: #161b22;
    }
    .node-label {
      font-size: 0.6rem;
      color: #8b949e;
      text-align: center;
      max-width: 72px;
      line-height: 1.35;
    }
    .node-sublabel {
      font-size: 0.55rem;
      color: #484f58;
      text-align: center;
      max-width: 80px;
      line-height: 1.3;
    }

    /* arrow */
    .arrow {
      color: #30363d;
      font-size: 1rem;
      align-self: center;
      flex-shrink: 0;
      padding: 0 0.2rem 1.5rem 0.2rem;
    }

    /* swim lane wrapper */
    .blueprint {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .lane {
      display: flex;
      align-items: stretch;
      min-height: 110px;
    }
    .lane + .lane {
      border-top: 1px dashed #30363d;
    }
    .lane-label {
      width: 110px;
      flex-shrink: 0;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 0.5rem;
    }
    .lane-label span {
      font-size: 0.6rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    .lane-content {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 1.25rem 1rem;
      gap: 0.25rem;
      overflow-x: auto;
    }

    /* stage boxes (lane 2) */
    .stage-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.65rem;
      color: #e6edf3;
      text-align: center;
      line-height: 1.35;
      white-space: nowrap;
    }

    /* skills layer (lane 3) */
    .skills-lane {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 0;
      flex: 1;
      align-items: start;
    }
    .skill-col {
      border-right: 1px dotted #21262d;
      padding: 0.75rem 0.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-height: 130px;
    }
    .skill-col:last-child { border-right: none; }
    .skill-col::before {
      content: '';
      display: block;
      width: 1px;
      height: 10px;
      border-left: 1px dotted #30363d;
      margin: 0 auto 0.3rem auto;
    }
    .skill-chip {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.2rem 0.35rem;
      font-size: 0.57rem;
      color: #8b949e;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }
    .skill-chip.amber  { border-color: #e3b341; color: #e3b341; background: #2a1f05; }
    .skill-chip.purple { border-color: #bc8cff; color: #bc8cff; background: #1e0d33; }
    .skill-chip.coral  { border-color: #ff7b72; color: #ff7b72; background: #2a0d0d; }
    .skill-chip.green  { border-color: #56d364; color: #56d364; background: #0d2a1a; }
    .skill-chip.blue   { border-color: #58a6ff; color: #58a6ff; background: #0d2340; }
    .skill-chip.multi  { opacity: 0.65; font-style: italic; }

    /* divider + links */
    .divider { border: none; border-top: 1px solid #21262d; margin: 1.5rem 0; }
    .links { display: flex; gap: 1.5rem; font-size: 0.8rem; flex-wrap: wrap; }
    .links a { color: #58a6ff; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">

  <div class="badge">Architecture Blueprint</div>
  <h1>Hermes Agent — System Architecture</h1>
  <p class="sub">
    Orchestration · ML Lifecycle · 24 Skills ·
    Built on <a href="https://github.com/NousResearch/hermes-agent">NousResearch hermes-agent</a>
  </p>

  <div class="blueprint">
    <!-- lanes added in subsequent tasks -->
  </div>

  <hr class="divider">
  <div class="links">
    <a href="guide.html">Field Guide</a>
    <a href="gsi-handout.html">GSI Reference</a>
    <a href="../index.html">Install</a>
    <a href="https://github.com/QbitLoop/hermes">GitHub</a>
  </div>

</div>
</body>
</html>
